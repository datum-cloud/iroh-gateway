name: Publish Docker Image

on:
  pull_request:
  push:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      extra-build-args: ${{ steps.args.outputs.value }}
    steps:
      - id: args
        env:
          KEY: ${{ secrets.BUILD_IROH_SERVICES_API_KEY }}
        run: printf 'value=BUILD_IROH_SERVICES_API_KEY=%s\n' "$KEY" >> "$GITHUB_OUTPUT"

  publish:
    needs: prepare
    uses: datum-cloud/actions/.github/workflows/publish-docker.yaml@v1.9.0
    with:
      image-name: iroh-gateway
      extra-build-args: ${{ needs.prepare.outputs.extra-build-args }}
    secrets: inherit
